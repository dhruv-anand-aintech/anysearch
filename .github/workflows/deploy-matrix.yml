name: Deploy search provider matrix

on:
  push:
    branches: [main]
    paths:
      - "docs/tools/search_matrix/**"
      - "scripts/generate_search_matrix_data.py"
      - "python/src/anysearch/providers/**"
      - "worker/matrix.js"
      - "wrangler.toml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: npm ci

      - name: Sync matrix data from anysearch providers
        run: |
          pip install -e ./python
          npm run matrix:sync

  deploy:
    needs: sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: npm ci

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Skipping deploy: add CLOUDFLARE_API_TOKEN to repo Actions secrets (see docs/tools/search_matrix/README.md)."
            exit 0
          fi
          npx wrangler deploy --config wrangler.toml
